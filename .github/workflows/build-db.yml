name: Build (DB)

# Build workflow for packages/db

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check migrations
        run: pnpm --filter @electron-template/db exec drizzle-kit check --config=drizzle.config.ts

      - run: pnpm build -r packages/db