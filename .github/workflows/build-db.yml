name: Build (DB)

# Build workflow for packages/db

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check migrations
        run: npx drizzle-kit check --config=packages/db/drizzle.config.ts

      - run: npm run build -w packages/db