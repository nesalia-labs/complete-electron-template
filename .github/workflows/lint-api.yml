name: Lint (API)

# Lint workflow for packages/api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @electron-template/api lint