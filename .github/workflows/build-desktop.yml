name: Build (Desktop)

# Build workflow for apps/desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build SDK
        run: npm run build -w packages/sdk

      - name: Build web app
        run: npm run build -w apps/web

      - run: npm run build
        working-directory: apps/desktop