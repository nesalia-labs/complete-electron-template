name: Build (Desktop)

# Build workflow for apps/desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @electron-template/sdk build

      - name: Build web app
        run: pnpm --filter web build

      - run: pnpm --filter desktop build