name: Release Desktop App
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @electron-template/sdk build

      - name: Build web app
        run: pnpm --filter web build

      - name: Copy web assets to renderer
        run: cp -r apps/web/dist apps/desktop/out/renderer

      - name: Build desktop app (with electron-builder)
        run: |
          cd apps/desktop && npx electron-vite build && node -e "require('fs').cpSync('../web/dist', 'out/renderer', {recursive: true})" && npx electron-builder --win --config electron-builder.json --x64 --dir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: apps/desktop/release/**

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}