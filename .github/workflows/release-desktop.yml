name: Release Desktop App
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build SDK
        run: npm run build -w packages/sdk

      - name: Build web app
        run: npm run build -w apps/web

      - name: Copy web assets to renderer
        run: cp -r apps/web/dist apps/desktop/out/renderer

      - name: Build desktop app (with electron-builder)
        run: |
          npx electron-builder --win --config ./apps/desktop/electron-builder.json --x64 --dir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: apps/desktop/release/**

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}