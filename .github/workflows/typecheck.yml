name: Typecheck (Web)

# Typecheck workflow for apps/web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter web typecheck